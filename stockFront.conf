<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/STOCK/frontend

    <Directory /var/www/html/STOCK/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://localhost:8888/api
    ProxyPassReverse /api http://localhost:8888/api


    ErrorLog /var/log/httpd/frontend_error.log
    CustomLog /var/log/httpd/frontend_access.log combined
</VirtualHost>
