services:

  stock-db:
    image: postgres:15-alpine
    container_name: stock-db
    environment:
      POSTGRES_DB: stock-db
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_password
    volumes:
      - client-data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U client_user -d client-db"]
      interval: 10s
      timeout: 5s
      retries: 5


  stock-service:
    build:
      context: ./stock-service
      dockerfile: Dockerfile
      network: host
    container_name: stock-service
   # environment:

    ports:
      - 8081:8081

