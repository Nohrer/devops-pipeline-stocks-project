spring.application.name=gateway-service
server.port=8888

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Gateway Routes Configuration
spring.cloud.gateway.server.webmvc.routes[0].id=stock-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://STOCK-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[0].predicates[0].args.pattern=/api/stocks/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0].name=StripPrefix
spring.cloud.gateway.server.webmvc.routes[0].filters[0].args.parts=1

# Enable discovery locator (optional - for automatic routing)
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# OAuth2 Resource Server Configuration - Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/stock-adria
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/stock-adria/protocol/openid-connect/certs

# Keycloak Configuration for Authentication
keycloak.auth-server-url=http://localhost:8080
keycloak.realm=stock-adria
keycloak.client-id=stock-management-client
# Add client secret here if using confidential client (get from Keycloak admin console)
keycloak.client-secret=HvY1fxjVUo4rfbmoPbvhZxJYs48PCD2O

# Note: CORS is configured in SecurityConfig.java for Spring Cloud Gateway MVC
